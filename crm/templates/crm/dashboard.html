{% extends 'crm/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="fw-bold">My Dashboard</h2>
    <hr>

    <div class="row">
        <div class="col-md-8 mb-4">
            <div class="card shadow-sm border-0 p-3" style="border-radius: 15px;">
                <h5 class="fw-bold mb-3">Task Overview</h5>
                <canvas id="myChart" width="400" height="200"></canvas>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card shadow-sm border-0 p-3" style="border-radius: 15px;">
                <h5 class="fw-bold mb-3">My Recent Tasks</h5>
                <ul class="list-group list-group-flush">
                    {% for task in tasks %}
                        <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                            <div>
                                <strong class="text-dark">{{ task.title }}</strong> <br>
                                <small class="text-muted">{{ task.status|title }}</small>
                            </div>
                            </li>
                    {% empty %}
                        <li class="list-group-item text-muted">No tasks assigned yet.</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ctx = document.getElementById('myChart');
    
    new Chart(ctx, {
        type: 'bar', 
        data: {
            labels: ['To Do', 'In Progress', 'Done'],
            datasets: [{
                label: '# of Tasks',
                data: [{{ todo_count|default:0 }}, {{ progress_count|default:0 }}, {{ done_count|default:0 }}],
                backgroundColor: [
                    'rgba(255, 99, 132, 0.2)', 
                    'rgba(255, 206, 86, 0.2)', 
                    'rgba(75, 192, 192, 0.2)'
                ],
                borderColor: [
                    'rgba(255, 99, 132, 1)',
                    'rgba(255, 206, 86, 1)',
                    'rgba(75, 192, 192, 1)'
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        stepSize: 1 
                    }
                }
            }
        }
    });
</script>
{% endblock %}
