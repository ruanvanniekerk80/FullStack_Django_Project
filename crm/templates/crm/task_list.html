{% extends 'crm/base.html' %}
{% block content %}

<h2>Tasks</h2>
<a href="{% url 'task_create' %}" class="btn btn-success mb-3">+ New Task</a>

<div class="card p-3 shadow-sm">
    <table class="table align-middle">
        <thead>
            <tr>
                <th>Title</th>
                <th>Status</th>
                <th>Project</th>
                <th>Assigned To</th>
                <th class="text-end">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for task in tasks %}
            <tr>
                <td>{{ task.title }}</td>
                <td><span class="badge bg-secondary">{{ task.get_status_display }}</span></td>
                <td>{{ task.project.name }}</td>
                <td>{{ task.assigned_to }}</td>
                <td class="text-end">
                    <a href="{% url 'task_detail' task.id %}" class="btn btn-sm btn-info text-white">View</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="text-center">No tasks found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
