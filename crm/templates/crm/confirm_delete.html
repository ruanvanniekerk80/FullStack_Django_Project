{% extends 'crm/base.html' %}
{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0" style="border-radius: 15px;">
                <div class="card-body p-5 text-center">
                    <h2 class="fw-bold mb-4">Are you sure you want to delete?</h2>
                    <p class="text-muted mb-4">You are about to permanently delete: <br>
                        <strong class="text-dark fs-5">"{{ task.title }}"</strong>
                    </p>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                            <button type="submit" class="btn btn-danger fw-bold px-4 py-2" style="border-radius: 10px;">
                                Yes, Delete
                            </button>

                            <a href="{% url 'task_detail' task.id %}" class="btn btn-outline-secondary fw-bold px-4 py-2" style="border-radius: 10px;">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
